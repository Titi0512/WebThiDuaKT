<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống quản lý khen thưởng</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }
        
        .login-body {
            padding: 2rem;
        }
        
        .form-floating label {
            color: #6c757d;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card mx-auto">
            <div class="login-header">
                <i class="bi bi-award-fill" style="font-size: 3rem;"></i>
                <h3 class="mt-3 mb-0">Đăng nhập hệ thống</h3>
                <p class="mb-0 mt-2 opacity-75">Trường Sĩ quan Chính trị</p>
            </div>
            <div class="login-body">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="alert alert-danger d-none" id="errorAlert"></div>
                    
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Tên đăng nhập" required>
                        <label for="username">
                            <i class="bi bi-person me-2"></i>Tên đăng nhập
                        </label>
                    </div>
                    
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Mật khẩu" required>
                        <label for="password">
                            <i class="bi bi-lock me-2"></i>Mật khẩu
                        </label>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-login">
                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            Đăng nhập
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <a href="/" class="text-decoration-none">
                        <i class="bi bi-house-door me-1"></i>Về trang chủ
                    </a>
                </div>
                
                <!-- Demo accounts info -->
                <div class="mt-4 p-3 bg-light rounded">
                    <small class="text-muted">
                        <strong>Tài khoản demo:</strong><br>
                        Admin: admin / admin123<br>
                        User: user / user123
                    </small>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            
            const form = event.target;
            const errorAlert = document.getElementById('errorAlert');
            const submitBtn = form.querySelector('button[type="submit"]');
            
            // Get form data
            const formData = new FormData();
            formData.append('username', form.username.value);
            formData.append('password', form.password.value);
            
            try {
                // Disable submit button
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';
                
                // Hide error alert
                errorAlert.classList.add('d-none');
                
                // Call login API
                const response = await axios.post('/api/auth/login', formData, {
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });
                
                if (response.data.access_token) {
                    // Save token
                    localStorage.setItem('token', response.data.access_token);
                    
                    // Redirect to dashboard
                    window.location.href = '/dashboard';
                }
            } catch (error) {
                // Show error
                errorAlert.classList.remove('d-none');
                errorAlert.textContent = error.response?.data?.detail || 'Đăng nhập thất bại. Vui lòng thử lại.';
                
                // Enable submit button
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập';
            }
        }
        
        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
